name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    name: Build Sites
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      # Build presentation (serves at /LightSpec/)
      - name: Build presentation
        working-directory: presentation
        run: |
          npm ci
          npm run build

      # Build viewer (serves at /LightSpec/viewer/)
      - name: Build viewer
        working-directory: viewer
        run: |
          npm ci
          npm run build

      # Build guide (serves at /LightSpec/guide/)
      - name: Build guide
        working-directory: guide
        run: |
          npm ci
          npm run build

      # Nest viewer and guide inside presentation build output
      - name: Combine build outputs
        run: |
          mkdir -p presentation/dist/viewer
          cp -r viewer/dist/. presentation/dist/viewer/
          mkdir -p presentation/dist/guide
          cp -r guide/dist/. presentation/dist/guide/

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: presentation/dist

  deploy:
    name: Deploy to GitHub Pages
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
